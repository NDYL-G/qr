<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Code Generator with Purpose</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="../css/qr.css" />
</head>
<body>
  <main class="container">
    <form id="qrForm" class="settings">
      <h1>QR Code Generator</h1>
      <label for="qrType">QR Code Type:</label>
      <select id="qrType">
        <option value="url">URL</option>
        <option value="text">Text</option>
        <option value="email">Email</option>
        <option value="phone">Phone</option>
        <option value="sms">SMS</option>
        <option value="wifi">Wi-Fi</option>
        <option value="vcard">vCard</option>
      </select>
      <div id="inputFields">
        <div id="urlField" class="purpose-field">
          <label for="urlInput">URL:</label>
          <input type="text" id="urlInput" />
        </div>
        <div id="textField" class="purpose-field">
          <label for="textInput">Text:</label>
          <input type="text" id="textInput" />
        </div>
        <div id="emailField" class="purpose-field">
          <label for="emailInput">Email:</label>
          <input type="email" id="emailInput" />
        </div>
        <div id="phoneField" class="purpose-field">
          <label for="phoneInput">Phone Number:</label>
          <input type="tel" id="phoneInput" />
        </div>
        <div id="smsField" class="purpose-field">
          <label for="smsInput">SMS Number:</label>
          <input type="tel" id="smsInput" />
        </div>
        <div id="wifiField" class="purpose-field">
          <label for="ssidInput">SSID:</label>
          <input type="text" id="ssidInput" />
          <label for="wifiPasswordInput">Password:</label>
          <input type="text" id="wifiPasswordInput" />
          <label for="encryption">Encryption:</label>
          <select id="encryption">
            <option value="WPA">WPA/WPA2</option>
            <option value="WEP">WEP</option>
            <option value="nopass">None</option>
          </select>
        </div>
        <div id="vcardField" class="purpose-field">
          <label for="vcardName">Name:</label>
          <input type="text" id="vcardName" />
          <label for="vcardEmail">Email:</label>
          <input type="email" id="vcardEmail" />
          <label for="vcardPhone">Phone:</label>
          <input type="tel" id="vcardPhone" />
        </div>
      </div>
      <label for="dotStyle">Dot Style:</label>
      <select id="dotStyle">
        <option value="square">Square</option>
        <option value="dots">Dots</option>
        <option value="rounded">Rounded</option>
      </select>
      <label for="cornerStyle">Corner Style:</label>
      <select id="cornerStyle">
        <option value="square">Square</option>
        <option value="dot">Dot</option>
        <option value="extra-rounded">Extra Rounded</option>
      </select>
      <label for="errorCorrection">Error Correction:</label>
      <select id="errorCorrection">
        <option value="L">Low</option>
        <option value="M">Medium</option>
        <option value="Q">Quartile</option>
        <option value="H">High</option>
      </select>
      <label for="mainColor">Main Color:</label>
      <input type="color" id="mainColor" value="#000000" />
      <label for="gradientColor">Gradient Color:</label>
      <input type="color" id="gradientColor" value="#000000" />
      <label for="qrLogo">Upload Logo:</label>
      <input type="file" id="qrLogo" accept="image/*" />
      <label for="logoSize">Logo Size (%):</label>
      <input type="range" id="logoSize" min="0" max="50" value="20" />
      <span id="logoSizeValue">20%</span>
      <div id="colourSwatches" style="margin-top: 10px;"></div>
      <img id="logoPreview" style="display: none;" />
      <button type="submit">Generate QR Code</button>
    </form>
    <div class="qr-display">
      <div id="qrCanvas"></div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qr-code-styling/1.5.0/qr-code-styling.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-color-thief/2.4.0/color-thief.umd.js"></script>
  <script src="../js/qr-purpose.js"></script>
</body>
</html>
